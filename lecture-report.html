        // Generate pages dynamically
        function generatePages(sectionNumber) {
            const wrapper = document.getElementById('contentWrapper');
            wrapper.innerHTML = '';

            const section = sectionData[sectionNumber];
            if (!section) return;

            section.pages.forEach((page, index) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'pdf-page visible';
                pageDiv.innerHTML = `
                    <div class="page-header">
                        <h1>박용후 대표 '관점을 디자인하라' 강연 핵심 내용 분석 보고서</h1>
                        <div class="page-number">Page ${index + 1} of ${section.pages.length}</div>
                    </div>
                    ${page.content}
                `;
                wrapper.appendChild(pageDiv);
            });

            // Initialize charts if needed
            initializeCharts();
        }

        // Navigation
        document.querySelectorAll('.sidebar-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const sectionNum = parseInt(this.dataset.section);
                generatePages(sectionNum);
            });
        });

        // PDF Download - Only content-wrapper, exclude sidebar
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            const activeBtn = document.querySelector('.sidebar-btn.active');
            const sectionName = activeBtn.querySelector('span').textContent.trim();

            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PDF 생성 중...';

            try {
                // Clone content-wrapper to avoid modifying the original
                const contentWrapper = document.getElementById('contentWrapper');
                const clone = contentWrapper.cloneNode(true);

                // Create temporary container for PDF generation
                const tempContainer = document.createElement('div');
                tempContainer.style.position = 'absolute';
                tempContainer.style.left = '-9999px';
                tempContainer.style.width = '210mm';
                tempContainer.appendChild(clone);
                document.body.appendChild(tempContainer);

                const opt = {
                    margin: [25, 20, 25, 20],
                    filename: `${sectionName.replace(/\s+/g, '_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        letterRendering: true,
                        backgroundColor: '#ffffff',
                        logging: false
                    },
                    jsPDF: {
                        unit: 'mm',
                        format: 'a4',
                        orientation: 'portrait'
                    },
                    pagebreak: {
                        mode: ['avoid-all', 'css', 'legacy'],
                        before: ['h1'],
                        after: ['.pdf-page'],
                        avoid: ['blockquote', '.key-points', '.chart-container']
                    }
                };

                // Generate PDF
                await html2pdf().set(opt).from(clone).save();

                // Clean up
                document.body.removeChild(tempContainer);

                this.disabled = false;
                this.innerHTML = '<i class="fas fa-download"></i> PDF 다운로드';
            } catch (error) {
                console.error('PDF Error:', error);
                alert('PDF 생성 중 오류가 발생했습니다.');
                this.disabled = false;
                this.innerHTML = '<i class="fas fa-download"></i> PDF 다운로드';
            }
        });

        // Initialize charts function (placeholder)
        function initializeCharts() {
            // Chart initialization code here
        }

        // Initialize first section
        generatePages(0);
    </script>
